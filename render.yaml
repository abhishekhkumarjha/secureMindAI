services:
  - type: web
    name: securemindai
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: https://securemindai.onrender.com,http://localhost,http://127.0.0.1
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: RATE_LIMIT_ENABLED
        value: "true"
